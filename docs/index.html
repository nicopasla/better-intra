<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Better Intra</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.8.1/github-markdown.min.css">
  <style>
    body {
      background-color: #0d1117;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      padding: 3rem;
      border-radius: 8px;
      background-color: #161b22;
      color: #c9d1d9;
    }
    .markdown-body img {
      max-width: 100%;
    }
    .markdown-body a {
      color: #58a6ff;
    }
    .markdown-body h2 {
      border-bottom-color: #30363d;
    }
    @media (max-width: 767px) {
      body { padding: 0.5rem; }
      .markdown-body { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <article id="content" class="markdown-body">
    <p>Loading...</p>
  </article>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.12/marked.min.js"></script>
  <script>
    fetch("../README.md")
      .then(r => r.text())
      .then(md => {
        document.getElementById("content").innerHTML = marked.parse(md);
      })
      .catch(() => {
        document.getElementById("content").innerHTML = "<h1>Better Intra</h1><p>Failed to load README. <a href='https://github.com/nicopasla/better-intra'>View on GitHub</a>.</p>";
      });
  </script>
</body>
</html>
