<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: "Better Intra" }}</title>
  <style>
    * { box-sizing: border-box; }
    body {
      background-color: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      margin: 0;
      padding: 2rem 1rem;
      display: flex;
      justify-content: center;
    }
    .container {
      max-width: 980px;
      width: 100%;
      background: #161b22;
      border-radius: 8px;
      padding: 3rem;
    }
    nav {
      display: flex;
      gap: 1.5rem;
      border-bottom: 1px solid #30363d;
      padding-bottom: 0.75rem;
      margin-bottom: 2rem;
    }
    nav a { color: #8b949e; text-decoration: none; font-weight: 500; }
    nav a.active, nav a:hover { color: #f0f6fc; }
    h1 { border-bottom: 1px solid #30363d; padding-bottom: 0.3em; font-size: 2em; }
    h2 { border-bottom: 1px solid #30363d; padding-bottom: 0.3em; font-size: 1.5em; margin-top: 2em; }
    h3 { font-size: 1.25em; margin-top: 1.5em; }
    a { color: #58a6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    img { max-width: 100%; }
    code {
      background: #30363d;
      padding: 0.2em 0.4em;
      border-radius: 3px;
      font-size: 0.9em;
    }
    pre {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 1rem;
      overflow-x: auto;
    }
    pre code { background: none; padding: 0; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #30363d; padding: 0.5rem 1rem; text-align: left; }
    th { background: #21262d; }
    blockquote {
      border-left: 3px solid #30363d;
      margin: 0;
      padding: 0 1em;
      color: #8b949e;
    }
    hr { border: none; border-top: 1px solid #30363d; margin: 2em 0; }
    ul, ol { padding-left: 2em; }
    li { margin: 0.25em 0; }
    @media (max-width: 767px) {
      body { padding: 0.5rem; }
      .container { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
      <a href="{{ '/PRIVACY' | relative_url }}" {% if page.url contains 'PRIVACY' %}class="active"{% endif %}>Privacy</a>
      <a href="{{ '/DEVELOPMENT' | relative_url }}" {% if page.url contains 'DEVELOPMENT' %}class="active"{% endif %}>Development</a>
    </nav>
    {{ content }}
  </div>
</body>
</html>
