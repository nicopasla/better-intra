<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Better Intra</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 360px;
        max-width: 360px;
        overflow-x: hidden;
        margin: 0;
        padding: 0;
        scrollbar-width: none;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #1d2028;
        color: #f2f2f2;
        width: 340px;
        max-width: 340px;
        overflow: hidden;
      }
      .popup-header {
        padding: 14px 18px 12px;
        border-bottom: 0.5px solid rgba(255, 255, 255, 0.06);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .popup-icon {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        flex-shrink: 0;
      }
      .popup-icon.booking {
        background: rgba(0, 186, 188, 0.15);
      }
      .popup-icon.booking i {
        color: #00babc;
      }
      .popup-icon.reminder {
        background: rgba(255, 165, 0, 0.15);
      }
      .popup-icon.reminder i {
        color: #ffb347;
      }
      .popup-badge {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        padding: 2px 7px;
        border-radius: 4px;
        margin-bottom: 2px;
        display: inline-block;
      }
      .popup-badge.booking {
        background: rgba(0, 186, 188, 0.15);
        color: #00babc;
      }
      .popup-badge.reminder {
        background: rgba(255, 165, 0, 0.12);
        color: #ffb347;
      }
      .popup-title {
        font-size: 13px;
        font-weight: 600;
        color: #f2f2f2;
      }
      .popup-body {
        padding: 14px 18px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .popup-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .popup-row-icon {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.05);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: #7a8192;
        font-size: 14px;
      }
      .popup-row-label {
        font-size: 11px;
        color: #666e80;
        margin-bottom: 1px;
      }
      .popup-row-value {
        font-size: 13px;
        font-weight: 500;
        color: #d0d4de;
      }
      .popup-user-link {
        display: none;
        text-decoration: none;
      }
      .popup-user-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 12px;
        background: rgba(0, 186, 188, 0.06);
        border-radius: 8px;
        border: 0.5px solid rgba(0, 186, 188, 0.15);
        cursor: pointer;
        transition: background 0.15s;
      }
      .popup-user-link:hover .popup-user-row {
        background: rgba(0, 186, 188, 0.12);
      }
      .popup-avatar {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: rgba(0, 186, 188, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 600;
        color: #00babc;
        flex-shrink: 0;
      }
      .popup-user-name {
        font-size: 13px;
        font-weight: 600;
        color: #e8eaf0;
      }
      .popup-user-sub {
        font-size: 11px;
        color: #00babc;
        display: flex;
        align-items: center;
        gap: 3px;
      }
      .popup-divider {
        height: 0.5px;
        background: rgba(255, 255, 255, 0.06);
        margin: 0 18px 14px;
      }
      .popup-footer {
        padding: 0 18px 16px;
        display: flex;
        gap: 8px;
      }
      .popup-btn {
        flex: 1;
        padding: 8px;
        border-radius: 8px;
        border: none;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }
      .popup-btn.ghost {
        background: rgba(255, 255, 255, 0.06);
        color: #a0a6b4;
      }
      .popup-btn.ghost:hover {
        background: rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>
  <body>
    <div class="popup-header">
      <div class="popup-icon" id="icon">
        <i id="icon-glyph"></i>
      </div>
      <div>
        <div class="popup-badge" id="badge"></div>
        <div class="popup-title" id="title"></div>
      </div>
    </div>

    <div class="popup-body">
      <div class="popup-row">
        <div class="popup-row-icon"><i class="ti ti-code"></i></div>
        <div>
          <div class="popup-row-label">Project</div>
          <div class="popup-row-value" id="message"></div>
        </div>
      </div>
      <div class="popup-row">
        <div class="popup-row-icon"><i class="ti ti-clock"></i></div>
        <div>
          <div class="popup-row-label">Scheduled for</div>
          <div class="popup-row-value" id="time"></div>
        </div>
      </div>
      <a class="popup-user-link" id="user-link" href="#" target="_blank">
        <div class="popup-user-row">
          <div class="popup-avatar" id="user-avatar"></div>
          <div style="flex: 1">
            <div class="popup-user-name" id="user-name"></div>
            <div class="popup-user-sub">
              View profile
              <i class="ti ti-external-link" style="font-size: 11px"></i>
            </div>
          </div>
          <i
            class="ti ti-chevron-right"
            style="color: #00babc; font-size: 14px"
          ></i>
        </div>
      </a>
    </div>

    <div class="popup-divider"></div>
    <div class="popup-footer">
      <button class="popup-btn ghost" id="dismiss">Dismiss</button>
    </div>

    <script src="alert.js"></script>
  </body>
</html>
